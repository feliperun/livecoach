name: release-health

# Independent watchdog: the auto-update feed for the *latest* release must stay
# reachable and signed. Catches the silent case where a release shipped without
# assets (as v1.0.0–v1.2.0 did) regardless of why the packaging pipeline failed.

on:
  schedule:
    - cron: '0 12 * * 1' # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  appcast:
    runs-on: ubuntu-latest
    steps:
      - name: Latest release must serve a valid Sparkle appcast
        run: |
          set -euo pipefail
          feed="https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml"
          echo "Checking $feed"
          body=$(curl -fsSL "$feed") \
            || { echo "::error::appcast feed unreachable — auto-update is broken"; exit 1; }
          grep -q "<enclosure" <<<"$body" \
            || { echo "::error::appcast has no <enclosure> — no downloadable build"; exit 1; }
          grep -q "edSignature" <<<"$body" \
            || { echo "::error::appcast enclosure is not EdDSA-signed"; exit 1; }
          echo "OK: latest appcast is reachable and signed."
