name: quality

on:
  push:
    branches: [main]
  pull_request:

# Nota: o build do app (xcodebuild) roda LOCALMENTE — CueMe exige o SDK do
# macOS 26 (SpeechAnalyzer/Translation), que os runners do GitHub ainda não têm
# (macos-latest = Xcode 16 / SDK 15). Quando houver runner macOS 26, adicionar
# um job `build` com `runs-on: macos-26`. Enquanto isso, o gate de CI é o Sentrux
# (estrutural, independente de plataforma) + o build local exigido no AGENTS.md.

jobs:
  sentrux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gate precisa do merge base

      - name: Install Sentrux
        env:
          SENTRUX_VERSION: v0.5.7
        run: |
          mkdir -p "$HOME/.sentrux/bin"
          curl -fsSL "https://github.com/sentrux/sentrux/releases/download/${SENTRUX_VERSION}/sentrux-linux-x86_64" \
            -o "$HOME/.sentrux/bin/sentrux"
          chmod +x "$HOME/.sentrux/bin/sentrux"
          echo "$HOME/.sentrux/bin" >> "$GITHUB_PATH"

      - name: Sentrux check (regras absolutas)
        run: sentrux check .

      - name: Sentrux gate (sem regressão)
        if: github.event_name == 'pull_request'
        run: sentrux gate .
