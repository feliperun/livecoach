name: quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: >-
          xcodebuild
          -project CueMe.xcodeproj
          -scheme CueMe
          -destination 'platform=macOS'
          -packageAuthorizationProvider netrc
          test
          DEVELOPMENT_TEAM=
          CODE_SIGN_IDENTITY=-
          CODE_SIGNING_REQUIRED=YES

  sentrux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gate precisa do merge base

      - name: Install Sentrux
        env:
          SENTRUX_VERSION: v0.5.7
        run: |
          mkdir -p "$HOME/.sentrux/bin"
          curl -fsSL "https://github.com/sentrux/sentrux/releases/download/${SENTRUX_VERSION}/sentrux-linux-x86_64" \
            -o "$HOME/.sentrux/bin/sentrux"
          chmod +x "$HOME/.sentrux/bin/sentrux"
          echo "$HOME/.sentrux/bin" >> "$GITHUB_PATH"

      - name: Sentrux check (regras absolutas)
        run: sentrux check .

      - name: Sentrux gate (sem regressão)
        if: github.event_name == 'pull_request'
        run: sentrux gate .
