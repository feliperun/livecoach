name: release-assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to package (for example v0.7.0)
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-26
    timeout-minutes: 25
    env:
      TAG: ${{ inputs.tag || github.event.release.tag_name }}
      HAS_CERT: ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 != '' }}
      HAS_NOTARY: ${{ secrets.NOTARY_APPLE_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      # A stable Apple signing identity — Developer ID *or* the free Personal
      # Team "Apple Development" certificate — keeps the app's designated
      # requirement, and therefore its macOS TCC grants, constant across Sparkle
      # updates. Ad-hoc signing resets them on every update, so refuse to ship
      # without a real certificate (see ADR 0036).
      - name: Require a signing certificate
        if: ${{ env.HAS_CERT != 'true' }}
        run: |
          echo "::error::SIGNING_CERTIFICATE_P12_BASE64 is required (see ADR 0036)."
          exit 1

      - name: Resolve version
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Import signing certificate
        env:
          P12: ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo "$P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          identity=$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\(.*\)".*/\1/p' | head -1)
          [ -n "$identity" ] || { echo "::error::Imported certificate has no codesigning identity"; exit 1; }
          team=$(printf '%s' "$identity" | sed -n 's/.*(\([A-Z0-9]\{10\}\)).*/\1/p')
          [ -n "$team" ] || { echo "::error::Could not derive Team ID from identity: $identity"; exit 1; }
          echo "SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "SIGNING_TEAM=$team" >> "$GITHUB_ENV"
          echo "Signing as: $identity (team $team)"

      - name: Build DMG
        env:
          CUEME_ADHOC_SIGN: '0'
          CUEME_SIGNING_IDENTITY: ${{ env.SIGNING_IDENTITY }}
          CUEME_DEVELOPMENT_TEAM: ${{ env.SIGNING_TEAM }}
        run: ./scripts/package.sh "$VERSION"

      # Notarization needs a paid Developer ID identity. Skipped for the free
      # Personal Team cert — those builds ship unnotarized (one-time Gatekeeper
      # "Open Anyway" on first install; Sparkle updates stay in-place).
      - name: Notarize and staple
        if: ${{ startsWith(env.SIGNING_IDENTITY, 'Developer ID Application') && env.HAS_NOTARY == 'true' }}
        env:
          APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          TEAM_ID: ${{ env.SIGNING_TEAM }}
          APP_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool submit "dist/CueMe-$VERSION.dmg" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APP_PASSWORD" --wait
          xcrun stapler staple "dist/CueMe-$VERSION.dmg"
          shasum -a 256 "dist/CueMe-$VERSION.dmg" > "dist/CueMe-$VERSION.dmg.sha256"

      - name: Install Sparkle tools
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download 2.9.4 -R sparkle-project/Sparkle \
            -p 'Sparkle-2.9.4.tar.xz' -D "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle/Sparkle-2.9.4.tar.xz" -C "$RUNNER_TEMP/sparkle"

      - name: Generate signed appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          test -n "$SPARKLE_PRIVATE_KEY"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle-private-key"
          "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle-private-key" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/$TAG/" \
            dist

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "$TAG"
          "dist/CueMe-$VERSION.dmg"
          "dist/CueMe-$VERSION.dmg.sha256"
          "dist/appcast.xml"
          --clobber

      # Fail loud if a "successful" run somehow shipped a release without the
      # assets Sparkle needs. Guards against silent no-ops that leave the
      # auto-update feed pointing at a 404 (see ADR 0035).
      - name: Verify published assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          names=$(gh release view "$TAG" -R "${{ github.repository }}" --json assets --jq '.assets[].name')
          echo "Assets on $TAG:"; echo "$names"
          for required in "CueMe-$VERSION.dmg" "CueMe-$VERSION.dmg.sha256" "appcast.xml"; do
            grep -qx "$required" <<<"$names" \
              || { echo "::error::Release $TAG is missing asset $required"; exit 1; }
          done
          grep -q "CueMe-$VERSION.dmg" dist/appcast.xml \
            || { echo "::error::appcast.xml does not reference CueMe-$VERSION.dmg"; exit 1; }
          grep -q "edSignature" dist/appcast.xml \
            || { echo "::error::appcast.xml is missing its EdDSA signature"; exit 1; }
          echo "Verified: $TAG serves DMG, checksum and a signed appcast."
