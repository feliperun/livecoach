name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # release-please publishes the GitHub release with GITHUB_TOKEN, so its
  # `release: published` event never cascades into release-assets (GitHub
  # suppresses token-triggered event runs to avoid loops). workflow_dispatch is
  # the documented exception, so dispatch the packaging run explicitly here.
  package:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch release-assets for the new tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release-assets.yml \
            -R "${{ github.repository }}" \
            -f tag="${{ needs.release-please.outputs.tag_name }}"
